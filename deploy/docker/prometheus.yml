# Agent OS V6.0 - Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "agent-os-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:9090"]
        labels:
          app: agent-os
          component: api-gateway

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]