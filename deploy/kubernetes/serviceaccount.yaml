# ============================================================
# Agent OS V6.0 - ServiceAccount + RBAC
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-os-sa
  namespace: agent-os
  labels:
    app.kubernetes.io/name: agent-os
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-os-role
  namespace: agent-os
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-os-rb
  namespace: agent-os
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-os-role
subjects:
  - kind: ServiceAccount
    name: agent-os-sa
    namespace: agent-os