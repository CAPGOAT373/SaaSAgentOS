apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-os.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-os.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}