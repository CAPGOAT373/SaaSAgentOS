# ============================================================
# Agent OS V6.0 - Istio Gateway (Ingress)
# ============================================================
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: agent-os-gateway
  namespace: agent-os
  labels:
    app.kubernetes.io/name: agent-os
    app.kubernetes.io/version: "6.0.0"
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "api.agent-os.local"
        - "*.agent-os.local"
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - "api.agent-os.local"
        - "*.agent-os.local"
      tls:
        mode: SIMPLE
        credentialName: agent-os-tls-cert